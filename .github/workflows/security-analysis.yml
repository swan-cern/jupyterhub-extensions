name: Security Analysis (zizmor)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read # Required to read the code for analysis

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-analysis:
    name: Run Zizmor Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required to create security events from the analysis results
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Run zizmor security analysis
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          inputs: .github/workflows/*.yml # Don't specify just the folder. Otherwise, it won't load the preview in the results
          token: ${{ secrets.GITHUB_TOKEN }}
          min-severity: low
          min-confidence: low
          persona: auditor