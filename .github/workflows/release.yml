name: Release
run-name: "Release ${{ inputs.extension }}"

on:
  workflow_dispatch:
    inputs:
      extension:
        description: "Extension name"
        required: true
        type: choice
        options:
          - KeyCloakAuthenticator
          - SwanCuller
          - SwanHub
          - SwanSpawner
      bump:
        description: "Version bump"
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}  # Deny all permissions by default at workflow level

jobs:
  release:
    runs-on: ubuntu-latest
    environment: publish
    env:
      EXTENSION: ${{ inputs.extension }}
    permissions:
      id-token: write # Required for authentication with PyPI using OIDC
      contents: write # Required to push commits and tags

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: 3.14
          enable-cache: false

      - name: Bump version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          # Run bump2version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd ${EXTENSION}
          uvx bump2version ${BUMP}

          # Get the new tag and version
          TAG=$(git describe --tags --exact-match)
          VERSION=$(echo "$TAG" | cut -d / -f 2)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          # Get the previous tag for this extension
          PREV_TAG=$(git describe --tags --match "${EXTENSION}/*" --abbrev=0 HEAD~1 2>/dev/null || true)
          # If there is a previous tag, get commits since that tag, otherwise get all commits
          [ -n "$PREV_TAG" ] && RANGE="$PREV_TAG..HEAD" || RANGE="HEAD"
          # Format commit messages as a markdown list & remove the extension name from the beginning of the message
          EXT_LOWER=$(echo "${EXTENSION}" | tr '[:upper:]' '[:lower:]')
          git log "$RANGE" --pretty=format:"- %B" -- "${EXTENSION}" \
            | sed -r "s/$EXT_LOWER: //g" > /tmp/release_body.md

      - name: Push version bump commit and tag
        env:
          WORKFLOW_ACCESS_TOKEN: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}
        run: |
          # Bypass branch protection rules by using the workflow access token
          git remote set-url origin "https://x-access-token:${WORKFLOW_ACCESS_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin master --tags --atomic

      - name: Build wheel 📦
        run: |
          cd ${EXTENSION}
          uv build

      - name: Publish to PyPI 🚀
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: ./${{ env.EXTENSION }}/dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file /tmp/release_body.md

      - name: Trigger image update in jupyterhub-image
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh workflow run SWAN_CI_CD_pipeline.yml \
            --repo swan-cern/jupyterhub-image \
            --ref master \
            -f package="${EXTENSION}" \
            -f version="${VERSION}"
