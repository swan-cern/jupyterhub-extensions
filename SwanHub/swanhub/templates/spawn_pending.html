{% extends "templates/spawn_pending.html" %}
{% from "_macros.html" import swan_loader with context %}

{% block main %}
<main class="container">
  <div class="row">
    {% call swan_loader() %}
      <div class="text-body-secondary text-center">
        <h4 class="text-body-secondary">Starting your session...</h4>
        <p>You will be redirected automatically when it's ready for you.</p>
      </div>
    {% endcall %}
  </div>
</main>
{% endblock %}

{% block script %}
<script type="text/javascript">
// hook up event-stream for progress
const evtSource = new EventSource("{{ progress_url }}");
evtSource.onmessage = function(e) {
  const evt = JSON.parse(e.data);
  console.log(evt);
  if (evt.ready) {
    evtSource.close();
    // reload the current page
    // which should result in a redirect to the running server
    window.location.reload();
  }
  if (evt.failed) {
    evtSource.close();
    window.location.replace('{{base_url}}spawn?failed');
  }
}
// signal that page has finished loading (mostly for tests)
window._jupyterhub_page_loaded = true;
</script>
{% endblock %}
